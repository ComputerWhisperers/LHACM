[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "ANN001",
  "ANN002",
  "ANN003",
  "ANN201",
  "ANN202",
  "D100",
  "D101",
  "D102",
  "D103",
  "D104",
  "D107",
  "EM101",
  "EM102",
  "TRY003"
]

[tool.pytest.ini_options]
testpaths = ["tests"]
